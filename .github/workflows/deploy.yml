name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          # GitHub Secrets に GEMINI_API_KEY を登録すると、ビルド時に埋め込まれ
          # ユーザーはキー入力なしで音声を利用できる。未設定ならユーザーが
          # 音声設定ダイアログでキーを入れるフォールバックになる。
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 任意: 既定モデルを固定したい場合に設定（例: gemini-3.1-flash-tts-preview）
          VITE_GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: npx vite build

      - name: Create 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
